#!/system/bin/sh

# ── Path bootstrap ──────────────────────────────────────────────────────────
if ! command -v busybox >/dev/null 2>&1; then
  export PATH="/data/adb/magisk:/data/adb/ksu/bin:/data/adb/ap/bin:$PATH:/system/bin"
fi

# ── Directories ─────────────────────────────────────────────────────────────
box_dir="/data/adb/box"
box_run="${box_dir}/run"
box_pid="${box_run}/box.pid"
bin_dir="${box_dir}/bin"

# ── sing-box binary ─────────────────────────────────────────────────────────
bin_path="${bin_dir}/sing-box"
bin_log="${box_run}/sing-box.log"
box_log="${box_run}/runs.log"    # start.sh tees log() output here

# ── sing-box config ─────────────────────────────────────────────────────────
sing_config="${box_dir}/sing-box/config.json"

# ── Runtime ─────────────────────────────────────────────────────────────────
box_user_group="root:net_admin"

# ── tproxy settings ─────────────────────────────────────────────────────────
# Must match PROXY_TCP_PORT / PROXY_UDP_PORT in tproxy.conf AND
# listen_port of the tproxy inbound in sing-box/config.json (LAW-4).
tproxy_port="1536"

# ── upkernel optional ────────────────────────────────────────────────────────
# use_ghproxy="false"             # "true" = route GitHub downloads via ghproxy
# url_ghproxy="https://ghproxy.net"
# singbox_stable="true"           # "false" = allow pre-release versions
# github_token=""                 # GitHub PAT (raises API rate limit from 60 → 5000/hr)
