##############################################################################
# tproxy.conf — Cấu hình AndroidTProxyShell cho box_for_magisk (sing-box)
# File này được tproxy.sh source; tất cả biến và hàm của tproxy.sh
# đều có thể dùng bên trong các hook.
# Tài liệu: https://github.com/CHIZI-0618/AndroidTProxyShell
##############################################################################

# ── CỐT LÕI ─────────────────────────────────────────────────────────────────

# Người dùng/nhóm chạy tiến trình proxy (sing-box).
# Phải khớp với box_user_group trong settings.ini của box_for_magisk.
# Giá trị hiện tại: root:net_admin (mặc định, không cần đổi)
# Ví dụ: "0:3005"
CORE_USER_GROUP="root:net_admin"

# ── CỔNG PROXY ───────────────────────────────────────────────────────────────

# Cổng TCP mà sing-box lắng nghe cho tproxy inbound.
# PHẢI khớp với tproxy_port trong settings.ini (hiện tại = 1536).
# ⚠ box.service/prepare_singbox đã bị gỡ ở bản sing-box-only — KHÔNG còn tự
# đồng bộ port. Nếu đổi cổng, phải sửa TAY listen_port của tproxy inbound
# trong sing-box/config.json cho khớp, nếu không sẽ blackhole.
PROXY_TCP_PORT="1536"

# Cổng UDP mà sing-box lắng nghe cho tproxy inbound.
# Thường giống PROXY_TCP_PORT.
PROXY_UDP_PORT="1536"

# ── CHẾ ĐỘ PROXY ─────────────────────────────────────────────────────────────

# Chế độ proxy: 0=tự động (ưu tiên TPROXY, fallback REDIRECT),
#               1=bắt buộc TPROXY, 2=bắt buộc REDIRECT.
# TPROXY hỗ trợ cả TCP lẫn UDP; REDIRECT chỉ hỗ trợ TCP.
# Để 0 (tự động) là an toàn nhất trên hầu hết thiết bị Android.
# Ví dụ: 1 (nếu kernel chắc chắn hỗ trợ TPROXY)
PROXY_MODE=1

# ── HIỆU NĂNG ────────────────────────────────────────────────────────────────

# Chế độ hiệu năng: 0=bình thường, 1=tối ưu hiệu suất (bật conntrack, v.v.)
# Bật khi cần throughput cao; có thể tăng nhẹ tải CPU.
PERFORMANCE_MODE=0

# ── DNS ──────────────────────────────────────────────────────────────────────

# Bắt/chuyển hướng DNS (port 53):
#   0 = tắt — DNS đi qua tproxy inbound bình thường (port 1536)
#   1 = dùng TPROXY để chuyển DNS sang DNS_PORT
#   2 = dùng REDIRECT (NAT) để chuyển DNS sang DNS_PORT
#
# ⚠ CẢNH BÁO XUNG ĐỘT: sing-box trong config này KHÔNG có DNS server
# lắng nghe trên port 1053. sing-box xử lý DNS thông qua tproxy inbound
# (port 1536) — khi bật PROXY_UDP=1, gói DNS (UDP/53) đã tự động đi vào
# sing-box qua tproxy. Nếu đặt DNS_HIJACK_ENABLE=1 với DNS_PORT=1053,
# DNS sẽ bị chuyển đến cổng không ai lắng nghe → DNS hỏng hoàn toàn.
#
# GIỮ Ở 0 trừ khi bạn thêm DNS inbound riêng vào sing-box config.
DNS_HIJACK_ENABLE=0

# Cổng DNS để chuyển hướng đến (chỉ dùng khi DNS_HIJACK_ENABLE != 0).
# Nếu bật DNS hijack, sing-box cần có DNS inbound lắng nghe tại cổng này.
# Ví dụ: "1053" nếu thêm {"type":"dns","listen_port":1053} vào sing-box.
DNS_PORT="1053"

# ── GIAO DIỆN MẠNG ───────────────────────────────────────────────────────────

# Giao diện mạng di động (SIM/LTE).
# Android thường dùng "rmnet_data+" (dấu + = wildcard prefix match).
# Ví dụ thiết bị MediaTek: "ccmni+", Qualcomm: "rmnet_data+"
MOBILE_INTERFACE="rmnet_data+"

# Giao diện WiFi.
# Kiểm tra: ip link show | grep wlan
# Ví dụ thiết bị cũ: "wlan0", thiết bị mới có thể dùng "wlan1" cho STA
WIFI_INTERFACE="wlan0"

# Giao diện hotspot (phát WiFi từ điện thoại).
# Chỉ dùng khi PROXY_HOTSPOT=1. Thường là "wlan2" hoặc "ap0".
# Kiểm tra: ip link show khi bật hotspot
HOTSPOT_INTERFACE="wlan2"

# Giao diện USB tethering.
# Chỉ dùng khi PROXY_USB=1.
# Ví dụ: "rndis0", "usb0"
USB_INTERFACE="rndis+"

# Giao diện KHÁC cần bỏ qua proxy (bypass, cách nhau bởi dấu cách).
# ⚠ TƯƠNG ĐƯƠNG với ignore_out_list trong settings.ini của box_for_magisk.
# ignore_out_list trong settings.ini bị BỎ QUA khi dùng tproxy.sh.
# Nếu bạn đã cấu hình ap.list.cfg với "ignore ...", hãy chuyển sang đây.
# Ví dụ: "eth0 dummy0"
OTHER_BYPASS_INTERFACES=""

# Giao diện KHÁC cần được proxy (ngoài mobile/wifi/hotspot/usb).
# ⚠ TƯƠNG ĐƯƠNG với ap_list trong settings.ini của box_for_magisk.
# ap_list trong settings.ini bị BỎ QUA khi dùng tproxy.sh.
# Nếu đã cấu hình ap.list.cfg với "allow ...", hãy chuyển sang đây.
# Ví dụ: "wlan1 eth1"
OTHER_PROXY_INTERFACES=""

# ── BẬT/TẮT PROXY THEO GIAO DIỆN ────────────────────────────────────────────

# Proxy lưu lượng mạng di động (SIM/LTE): 1=bật, 0=tắt
PROXY_MOBILE=1

# Proxy lưu lượng WiFi: 1=bật, 0=tắt
PROXY_WIFI=1

# Proxy lưu lượng hotspot (chia sẻ mạng): 1=bật, 0=tắt
# Tắt theo yêu cầu (không cần hotspot proxying).
PROXY_HOTSPOT=0

# Proxy lưu lượng USB tethering: 1=bật, 0=tắt
PROXY_USB=0

# ── GIAO THỨC ────────────────────────────────────────────────────────────────

# Proxy TCP: 1=bật, 0=tắt
PROXY_TCP=1

# Proxy UDP: 1=bật, 0=tắt
# Phải bật để sing-box xử lý DNS (UDP/53) và các giao thức UDP khác.
PROXY_UDP=1

# ── IPv6 ─────────────────────────────────────────────────────────────────────

# Kiểm soát IPv6:
#   0  = không proxy IPv6 (stack IPv6 vẫn hoạt động, chỉ không qua proxy)
#   1  = proxy IPv6 bình thường
#  -1  = tắt hoàn toàn stack IPv6 (sysctl disable_ipv6=1)
#
# ⚠ CẢNH BÁO XUNG ĐỘT: settings.ini có ipv6="false" nhưng khi network_mode=tproxy,
# box.iptables KHÔNG gọi disable_ipv6() — IPv6 được kiểm soát hoàn toàn ở đây.
# Để khớp với hành vi ipv6="false" của box_for_magisk: dùng PROXY_IPV6=-1.
# Để giữ stack IPv6 nhưng không proxy: dùng PROXY_IPV6=0 (an toàn hơn).
# Đặt = -1 để khớp ipv6="false" (settings.ini) + strategy ipv4_only (config.json):
# tắt hẳn stack IPv6 khi proxy chạy → không rò rỉ traffic IPv6 ra ngoài proxy.
# (tproxy.sh tự disable_ipv6 khi start và restore khi stop.)
PROXY_IPV6=-1

# ── DANH SÁCH IP BYPASS / FORCE-PROXY ────────────────────────────────────────

# Danh sách subnet IPv4 KHÔNG qua proxy (cách nhau bởi dấu cách).
# Mặc định bao gồm tất cả dải private/reserved: 10.x, 172.16.x, 192.168.x, v.v.
# ⚠ Danh sách intranet của box.iptables tương đương và đã được thay thế bởi đây.
# Chỉ sửa nếu biết rõ lý do; danh sách mặc định rất toàn diện.
BYPASS_IPv4_LIST="0.0.0.0/8 10.0.0.0/8 100.0.0.0/8 127.0.0.0/8 169.254.0.0/16 172.16.0.0/12 192.0.0.0/24 192.0.2.0/24 192.88.99.0/24 192.168.0.0/16 198.51.100.0/24 203.0.113.0/24 224.0.0.0/4 240.0.0.0/4 255.255.255.255/32"

# Danh sách subnet IPv6 KHÔNG qua proxy.
# Chỉ có hiệu lực khi PROXY_IPV6=1.
BYPASS_IPv6_LIST="::/128 ::1/128 ::ffff:0:0/96 100::/64 64:ff9b::/96 2001::/32 2001:10::/28 2001:20::/28 2001:db8::/32 2002::/16 fe80::/10 ff00::/8"

# Danh sách subnet IPv4 BẮT BUỘC qua proxy (ghi đè bypass list).
# Để trống = dùng logic mặc định (proxy tất cả trừ danh sách bypass).
# Ví dụ: "8.8.8.8/32 1.1.1.0/24"
PROXY_IPv4_LIST=""

# Danh sách subnet IPv6 BẮT BUỘC qua proxy.
# Chỉ có hiệu lực khi PROXY_IPV6=1.
PROXY_IPv6_LIST=""

# ── HOTSPOT SUBNET (chỉ dùng khi HOTSPOT_INTERFACE == WIFI_INTERFACE) ────────

# Subnet hotspot IPv4 khi hotspot và WiFi dùng chung interface (thiết bị cũ).
# Chỉ có hiệu lực khi PROXY_HOTSPOT=1 VÀ HOTSPOT_INTERFACE = WIFI_INTERFACE.
HOTSPOT_SUBNET_IPV4="192.168.43.0/24"

# Subnet hotspot IPv6.
HOTSPOT_SUBNET_IPV6="fe80::/10"

# ── MARK VÀ BẢNG ĐỊNH TUYẾN ──────────────────────────────────────────────────

# Giá trị fwmark dùng để đánh dấu gói tin cần proxy (IPv4).
# ⚠ KHÔNG XUNG ĐỘT với box.iptables vì box.iptables dùng fwmark=16777216
# (0x1000000) nhưng không chạy khi network_mode=tproxy (tproxy.sh thay thế).
# Đảm bảo MARK_VALUE KHÔNG trùng với routing mark của sing-box (nếu có cấu hình).
# Ví dụ: 100, 255 (bất kỳ số nguyên dương nào không trùng)
MARK_VALUE=20

# Giá trị fwmark cho IPv6.
MARK_VALUE6=25

# ID bảng định tuyến (ip rule/ip route) dùng để định tuyến gói có mark.
# ⚠ KHÔNG XUNG ĐỘT với box.iptables (dùng table=2024); tproxy.sh dùng 2025.
# Chỉ đổi nếu bảng 2025 đã được dùng bởi phần mềm khác (VPN, v.v.)
# Kiểm tra: ip rule show | grep 2025
TABLE_ID=2025

# ── ROUTING MARK LỌC ─────────────────────────────────────────────────────────

# Nếu sing-box hoặc VPN đặt routing mark cho gói đã xử lý, điền vào đây
# để tproxy.sh bỏ qua (không proxy lại) các gói đó.
# Để trống nếu sing-box không dùng routing mark (trường hợp thông thường).
# Ví dụ: "100" (nếu sing-box config có route.default_mark = 100)
ROUTING_MARK=""

# Bắt buộc bypass gói có MARK_VALUE fwmark (chống vòng lặp proxy):
# 0 = tắt (mặc định), 1 = bật
# Thường không cần vì tproxy.sh đã xử lý loop-prevention qua socket match.
FORCE_MARK_BYPASS=0

# ── LỌC THEO ỨNG DỤNG (PER-APP PROXY) ───────────────────────────────────────

# Bật lọc per-app: 0=tắt (proxy tất cả), 1=bật
# ⚠ CẢNH BÁO XUNG ĐỘT QUAN TRỌNG:
# Khi network_mode=tproxy, box.iptables KHÔNG chạy — proxy_mode, package.list.cfg
# và uid_list trong box_for_magisk BỊ BỎ QUA hoàn toàn.
# Để lọc per-app, PHẢI dùng APP_PROXY_ENABLE=1 và cấu hình bên dưới.
APP_PROXY_ENABLE=1

# Chế độ lọc per-app:
#   "blacklist" = proxy tất cả TRỪ các app trong BYPASS_APPS_LIST
#   "whitelist" = chỉ proxy các app trong PROXY_APPS_LIST
APP_PROXY_MODE="blacklist"

# Danh sách app KHÔNG qua proxy (chế độ blacklist), cách nhau bởi dấu cách.
# Định dạng: "userId:package.name" hoặc chỉ "package.name" (mặc định user 0).
# Lấy userId: adb shell pm list packages --user (thường 0=chủ, 10=guest, 999=work)
# Lấy tên package: Settings → App info, hoặc adb shell pm list packages
#
# Ví dụ bypass các app hệ thống và VPN khác:
#   "com.android.shell 0:com.android.vpndialogs com.google.android.gms"
#
# ❗ Điền app của bạn vào đây (để trống = proxy tất cả):
BYPASS_APPS_LIST=""

# Danh sách app CHỈ ĐƯỢC proxy (chế độ whitelist), cách nhau bởi dấu cách.
# Chỉ dùng khi APP_PROXY_MODE="whitelist".
# Ví dụ: "com.example.browser 0:com.example.torrent"
PROXY_APPS_LIST=""

# ── BYPASS IP TRUNG QUỐC ─────────────────────────────────────────────────────

# Bỏ qua proxy cho IP Trung Quốc (dùng ipset): 0=tắt, 1=bật
#
# ⚠ CẢNH BÁO XUNG ĐỘT TIỀM ẨN:
# Khi bật, tproxy.sh tải danh sách CN IP (cn.zone) vào ipset và cấu hình
# iptables để các gói đến IP Trung Quốc đi THẲNG ra ngoài (không qua sing-box).
# Điều này ghi đè routing rules của sing-box cho CN traffic.
# - AN TOÀN nếu: sing-box config đã route CN IPs trực tiếp (DIRECT outbound).
# - NGUY HIỂM nếu: sing-box có logic phức tạp cho CN IPs (proxy một số, direct một số).
#
# Kết quả kiểm tra config sing-box hiện tại: có fakeip + remote_dns nhưng
# không thể xác định CN routing rules mà không đọc toàn bộ rules[].
# Khuyến nghị: giữ 0, bật CN bypass trong sing-box rules thay vì ở iptables.
#
# Nếu muốn bật: đổi thành 1 và xác nhận sing-box direct cho CN IPs.
BYPASS_CN_IP=0

# Tên file lưu danh sách CN IPv4 (lưu tại box_dir = /data/adb/box/).
# File được tải tự động từ CN_IP_URL, tự refresh sau 7 ngày.
CN_IP_FILE="cn.zone"

# Tên file lưu danh sách CN IPv6.
CN_IPV6_FILE="cn_ipv6.zone"

# URL tải danh sách CN IPv4 (dùng khi BYPASS_CN_IP=1).
# Nguồn mặc định: Hackl0us/GeoIP2-CN (cập nhật hàng ngày).
# Thay thế nếu không truy cập được GitHub: dùng mirror hoặc nguồn khác.
CN_IP_URL="https://raw.githubusercontent.com/Hackl0us/GeoIP2-CN/release/CN-ip-cidr.txt"

# URL tải danh sách CN IPv6 (dùng khi BYPASS_CN_IP=1 và PROXY_IPV6=1).
CN_IPV6_URL="https://ispip.clang.cn/all_cn_ipv6.txt"

# ── LỌC THEO MAC ADDRESS (HOTSPOT) ───────────────────────────────────────────

# Lọc per-device qua MAC address (chỉ dành cho hotspot clients): 0=tắt, 1=bật
# Vô hiệu hóa vì PROXY_HOTSPOT=0.
MAC_FILTER_ENABLE=0

# Danh sách MAC được proxy (chế độ whitelist) hoặc bị bypass (chế độ blacklist).
# Định dạng: "AA:BB:CC:DD:EE:FF 11:22:33:44:55:66"
PROXY_MACS_LIST=""

# Danh sách MAC bị bypass (chế độ blacklist) hoặc được proxy (chế độ whitelist).
BYPASS_MACS_LIST=""

# Chế độ lọc MAC: "blacklist" hoặc "whitelist"
MAC_PROXY_MODE="blacklist"

# ── CHẶN QUIC ────────────────────────────────────────────────────────────────

# Chặn giao thức QUIC (UDP/443 và UDP/80): 0=tắt, 1=bật
# ⚠ box.iptables có biến quic="enable" nhưng nó KHÔNG có hiệu lực khi
# network_mode=tproxy (box.iptables exit sớm, không chạy QUIC logic).
# Kiểm soát QUIC duy nhất ở đây là BLOCK_QUIC này.
# Bật theo yêu cầu — buộc trình duyệt/app dùng TCP thay vì QUIC/HTTP3.
BLOCK_QUIC=1

# ── LOGGING ──────────────────────────────────────────────────────────────────

# Thêm timestamp vào log: 1=bật, 0=tắt
# Tắt giúp tăng nhẹ hiệu năng (tránh fork process cho mỗi dòng log).
LOG_TIMESTAMP=1

# ── HOOK VÒNG ĐỜI ────────────────────────────────────────────────────────────
# Hai hàm này được tproxy.sh gọi tự động:
#   pre_start_hook  → được gọi TRƯỚC khi áp dụng iptables rules
#   post_stop_hook  → được gọi SAU khi xóa iptables rules
# box_for_magisk quản lý vòng đời của sing-box; các hook này KHÔNG được
# khởi động hay dừng sing-box.

# Verify sing-box is alive before applying iptables rules.
# start.sh start đã chạy trước tproxy.sh start và đã confirm port readiness
# qua wait_singbox_ready() — nên chỉ cần kiểm tra box.pid một lần.
pre_start_hook() {
    local pid
    pid=$(cat /data/adb/box/run/box.pid 2>/dev/null)
    [ -n "$pid" ] && kill -0 "$pid" 2>/dev/null && return 0
    log Error "sing-box not running (box.pid absent or dead) — aborting rule install to avoid blackhole"
    exit 1
}

# box_for_magisk owns sing-box lifecycle — do NOT stop sing-box here.
post_stop_hook() {
    :
}
